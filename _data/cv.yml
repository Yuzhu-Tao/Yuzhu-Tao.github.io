    publications:
      - title: Panoramic HDR Color Image from One-Second Spike Acquisition
        authors:
          - Yuzhu Tao
        journal: Under Review at ACM Multimedia, CCF-A
        date: 2026
        highlights:
          - Proposed a hybrid spike-camera and RGB-camera framework for HDR panoramic color image reconstruction from one-second spike acquisition.
          - Developed a dual-branch spike reconstruction pipeline based on temporal-window reconstruction and temporal-difference modeling.
          - Fine-tuned Qwen-Image-Edit-2509 with LoRA for HDR panoramic colorization guided by a single local RGB image.

      - title: Seam-Guided Unsupervised Image Stitching with Parallax-Aware Mask Generation
        authors:
          - Yuzhu Tao
        journal: IEEE Transactions on Circuits and Systems for Video Technology, CCF-B
        date: 2026
        highlights:
          - Proposed a seam-guided iterative alignment mechanism for unsupervised image stitching.
          - Designed a parallax-aware mask generation strategy to reduce artifacts in large-parallax scenes.

    internship experience:
      - company: Baidu Inc.
        position: Multimodal Algorithm Research Intern
        start_date: 2026-03
        end_date: present
        location: China
        highlights:
          - Conduct algorithm research on image understanding, image editing, parameter prediction, and generative model optimization.
          - Built a structured dataset for image-editing operators and editing instructions.
          - Fine-tuned Qwen3-VL-4B with LoRA for intelligent photo-editing parameter prediction.
          - Designed a two-stage training strategy to extend the model from single-image understanding to before-and-after editing difference modeling.
          - Achieved an F1-score of 92% on the test set.
          - Developed pose-aware alignment and structure-aware completion methods for AI portrait outfit replacement.

    selected projects:
      - name: Panoramic Image Stitching for Equipment Rooms Based on Spherical Projection
        start_date: 2024-09
        end_date: 2025-09
        location: Beijing, China
        summary: Core Algorithm Engineer
        highlights:
          - Proposed a fast panoramic stitching algorithm based on spherical projection for equipment-room scenarios with limited single-camera viewpoints.
          - Achieved panoramic reconstruction from 30 images within one second.
          - Estimated horizontal focal length using a cylindrical projection model and obtained dynamic FOV with zoom-lens information.
          - Built a spherical projection model and generated equirectangular projection panoramas through linear projection blending.
          - Deployed the algorithm in a real-world China Tower business scenario.

